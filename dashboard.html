<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics - Dynamis Currency Split</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(240,188,46,0.08) 0%, rgba(78,127,255,0.04) 100%);
  }
  .dashboard-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(240,188,46,0.4);
  }
  .logout-btn {
    background: rgba(200,64,64,0.15);
    border: 1px solid rgba(200,64,64,0.4);
    border-radius: 6px;
    color: var(--red);
    font-family: var(--font);
    font-size: 0.76rem;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover {
    background: rgba(200,64,64,0.3);
    border-color: rgba(200,64,64,0.6);
  }

  .dashboard-container {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
    padding: 20px;
  }

  .stats-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }

  .stat-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 16px rgba(255,224,102,0.3);
  }

  .stat-subtext {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .history-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .history-title {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 600px;
    overflow-y: auto;
  }

  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-item:hover {
    border-color: var(--accent);
    background: rgba(78,127,255,0.08);
  }

  .history-item-title {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-bright);
  }

  .history-item-meta {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }

  .error {
    background: rgba(200,64,64,0.1);
    border: 1px solid rgba(200,64,64,0.3);
    border-radius: 6px;
    color: var(--red);
    padding: 16px;
    margin: 20px;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.8rem;
    margin: 16px 20px 0;
    transition: color 0.2s;
  }

  .back-btn:hover {
    color: var(--accent);
  }

  @media (max-width: 900px) {
    .dashboard-container {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>

<div class="dashboard-header">
  <div class="dashboard-title">📊 Analytics Dashboard</div>
  <button class="logout-btn" onclick="handleLogout()">Logout</button>
</div>

<div class="dashboard-container" id="dashboard-container">
  <div class="loading">Loading analytics...</div>
</div>

<a href="index.html" class="back-btn">← Back to Calculator</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="db.js"></script>
<script>
  async function loadDashboard() {
    const container = document.getElementById('dashboard-container');
    
    // Check if logged in
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }

    try {
      // Load analytics and runs
      const [stats, runs] = await Promise.all([
        getAnalytics(),
        getRunHistory()
      ]);

      if (!stats) {
        container.innerHTML = '<div class="error">Error loading analytics. Please try again.</div>';
        return;
      }

      // Find most active player
      const topPlayer = Object.entries(stats.playerFrequency).length > 0
        ? Object.entries(stats.playerFrequency).sort((a, b) => b[1] - a[1])[0]
        : null;

      // Find avg currency
      const avgCurrency = Object.values(stats.currencyByType).length > 0
        ? Math.round(
            Object.values(stats.currencyByType).reduce((sum, c) => sum + (c.avg || 0), 0) /
            Object.keys(stats.currencyByType).length
          )
        : 0;

      // Build stats panel
      const statsHtml = `
        <div class="stats-panel">
          <div class="stat-card">
            <div class="stat-label">Total Runs</div>
            <div class="stat-value">${stats.totalRuns}</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Total Sales Income</div>
            <div class="stat-value">${(stats.totalSales || 0).toLocaleString()}</div>
            <div class="stat-subtext">gil from relic drops</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Avg Entry Fee</div>
            <div class="stat-value">${(stats.avgFeePerPlayer || 0).toLocaleString()}</div>
            <div class="stat-subtext">per player per run</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Most Active Player</div>
            <div class="stat-value">${topPlayer ? topPlayer[0] : 'N/A'}</div>
            <div class="stat-subtext">${topPlayer ? topPlayer[1] + ' runs' : ''}</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Avg Currency</div>
            <div class="stat-value">${avgCurrency}</div>
            <div class="stat-subtext">per run (all types)</div>
          </div>
        </div>
      `;

      // Build history section
      let historyHtml = '<div class="history-section"><div class="history-title">Recent Runs</div><div class="history-list">';
      
      if (runs.length === 0) {
        historyHtml += '<div style="color: var(--text-dim); padding: 20px; text-align: center;">No runs saved yet</div>';
      } else {
        runs.forEach(run => {
          const date = new Date(run.date).toLocaleDateString('en-GB', {
            day: '2-digit',
            month: 'short',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          const totalPlayers = (run.default_members?.length || 0) + (run.guest_players?.length || 0);
          const playerNames = [
            ...(run.default_members || []),
            ...(run.guest_players || [])
          ].join(', ');
          
          historyHtml += `
            <div class="history-item">
              <div class="history-item-title">${run.zone_name}</div>
              <div class="history-item-meta">${date} · ${totalPlayers} players · Fee: ${(run.entry_fee_per_player || 0).toLocaleString()} gil</div>
              <div class="history-item-meta" style="margin-top:6px;color:var(--text-dim);font-size:0.73rem;">${playerNames}</div>
            </div>
          `;
        });
      }

      historyHtml += '</div></div>';

      // Combine and render
      container.innerHTML = statsHtml + historyHtml;

    } catch (error) {
      console.error('Error:', error);
      container.innerHTML = '<div class="error">An error occurred while loading analytics.</div>';
    }
  }

  function handleLogout() {
    logout();
    window.location.href = 'login.html';
  }

  // Load on page load
  loadDashboard();
</script>

</body>
</html>
