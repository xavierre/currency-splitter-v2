<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics - Dynamis Currency Split</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(240,188,46,0.08) 0%, rgba(78,127,255,0.04) 100%);
  }
  .dashboard-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(240,188,46,0.4);
  }
  .logout-btn {
    background: rgba(200,64,64,0.15);
    border: 1px solid rgba(200,64,64,0.4);
    border-radius: 6px;
    color: var(--red);
    font-family: var(--font);
    font-size: 0.76rem;
    font-weight: 600;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .logout-btn:hover {
    background: rgba(200,64,64,0.3);
    border-color: rgba(200,64,64,0.6);
  }
 
  .dashboard-container {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
    padding: 20px;
  }
 
  .stats-panel {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
 
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
 
  .stat-label {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
 
  .stat-value {
    font-family: var(--mono);
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold-light);
    text-shadow: 0 0 16px rgba(255,224,102,0.3);
  }
 
  .stat-subtext {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 4px;
  }
 
  .history-section {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
 
  .history-title {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
  }
 
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 600px;
    overflow-y: auto;
  }

  .history-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .history-item:hover {
    border-color: var(--accent);
    background: rgba(78,127,255,0.08);
  }

  .history-expand {
    background: rgba(78,127,255,0.04);
    padding: 10px;
    border-radius: 4px;
    animation: slideDown 0.2s ease-out;
  }

  @keyframes slideDown {
    from {
      opacity: 0;
      max-height: 0;
    }
    to {
      opacity: 1;
      max-height: 500px;
    }
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-bright);
  }

  .history-item-meta {
    font-size: 0.78rem;
    color: var(--text-dim);
    margin-top: 4px;
  }
    margin-top: 4px;
  }
 
  .loading {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
 
  .error {
    background: rgba(200,64,64,0.1);
    border: 1px solid rgba(200,64,64,0.3);
    border-radius: 6px;
    color: var(--red);
    padding: 16px;
    margin: 20px;
  }
 
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.8rem;
    margin: 16px 20px 0;
    transition: color 0.2s;
  }
 
  .back-btn:hover {
    color: var(--accent);
  }
 
  @media (max-width: 900px) {
    .dashboard-container {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
 
<div class="dashboard-header">
  <div class="dashboard-title">📊 Analytics Dashboard</div>
  <button class="logout-btn" onclick="handleLogout()">Logout</button>
</div>
 
<div class="dashboard-container" id="dashboard-container">
  <div class="loading">Loading analytics...</div>
</div>
 
<a href="index.html" class="back-btn">← Back to Calculator</a>
 
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="db.js"></script>
<script>
  async function loadDashboard() {
    const container = document.getElementById('dashboard-container');
    
    // Check if logged in
    if (!isLoggedIn()) {
      window.location.href = 'login.html';
      return;
    }
 
    try {
      // Load analytics and runs
      const [stats, runs] = await Promise.all([
        getAnalytics(),
        getRunHistory()
      ]);
 
      if (!stats) {
        container.innerHTML = '<div class="error">Error loading analytics. Please try again.</div>';
        return;
      }
 
// Find most active player (top 5)
      const topPlayers = Object.entries(stats.playerFrequency)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      // Find top 3 runs (zones)
      const zoneFrequency = {};
      runs.forEach(run => {
        zoneFrequency[run.zone_name] = (zoneFrequency[run.zone_name] || 0) + 1;
      });
      const topZones = Object.entries(zoneFrequency)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);

      // Find avg currency per type
      const currencyTypes = Object.entries(stats.currencyByType).map(([type, data]) => ({
        type,
        avg: data.avg || 0
      }));
 
      // Build stats panel
      const statsHtml = `
        <div class="stats-panel">
          <div class="stat-card">
            <div class="stat-label">Total Runs</div>
            <div class="stat-value">${stats.totalRuns}</div>
          </div>
 
          <div class="stat-card">
            <div class="stat-label">Total Sales Income</div>
            <div class="stat-value">${(stats.totalSales || 0).toLocaleString()}</div>
            <div class="stat-subtext">gil from relic drops</div>
          </div>
 
          <div class="stat-card">
            <div class="stat-label">Avg Entry Fee</div>
            <div class="stat-value">${(stats.avgFeePerPlayer || 0).toLocaleString()}</div>
            <div class="stat-subtext">per player per run</div>
          </div>
 
          <div class="stat-card">
            <div class="stat-label">Most Active Players</div>
            <div class="stat-value">${topPlayers.length > 0 ? topPlayers[0][0] : 'N/A'}</div>
            <div class="stat-subtext">${topPlayers.length > 0 ? topPlayers[0][1] + ' runs' : ''}</div>
            ${topPlayers.slice(1).map(([name, runs]) => `<div class="stat-subtext" style="font-size:0.7rem;margin-top:2px;color:var(--text-dim);">${name} (${runs})</div>`).join('')}
          </div>

          <div class="stat-card">
            <div class="stat-label">Top 3 Zones</div>
            <div class="stat-value">${topZones.length > 0 ? topZones[0][0] : 'N/A'}</div>
            <div class="stat-subtext">${topZones.length > 0 ? topZones[0][1] + ' runs' : ''}</div>
            ${topZones.slice(1).map(([zone, runs]) => `<div class="stat-subtext" style="font-size:0.7rem;margin-top:2px;color:var(--text-dim);">${zone} (${runs})</div>`).join('')}
          </div>

          <div class="stat-card">
            <div class="stat-label">Avg Currency per Type</div>
            <div class="stat-value">${currencyTypes.length > 0 ? currencyTypes[0].avg : 0}</div>
            <div class="stat-subtext">${currencyTypes.length > 0 ? currencyTypes[0].type : ''}</div>
            ${currencyTypes.slice(1).map(c => `<div class="stat-subtext" style="font-size:0.7rem;margin-top:2px;">${c.type}: ${c.avg}</div>`).join('')}
          </div>
        </div>
      `;
 
      // Build history section
      let historyHtml = `
        <div class="history-section">
          <div class="history-title">Recent Runs</div>
          <div class="history-list">
      `;
      
      if (runs.length === 0) {
        historyHtml += '<div style="color: var(--text-dim); padding: 20px; text-align: center;">No runs saved yet</div>';
      } else {
        runs.forEach(run => {
          const date = new Date(run.date).toLocaleDateString('en-GB', {
            day: '2-digit',
            month: 'short'
          });
          const totalPlayers = (run.default_members?.length || 0) + (run.guest_players?.length || 0);
          const totalCurrency = (run.currency_data || []).reduce((sum, c) => sum + (c.perP || 0), 0);
          
          const runId = `run-${run.id}`;
          const playerNames = [
            ...(run.default_members || []),
            ...(run.guest_players || [])
          ].join(', ');
          const currencyHtml = (run.currency_data || []).map(c => 
            `<div style="font-size:0.8rem;margin:4px 0;"><span style="color:var(--text-dim);">${c.name}:</span> ${c.perP || 0} per player</div>`
          ).join('');
          const lotteryHtml = (run.leftover_results || []).map(lr =>
            `<div style="font-size:0.8rem;margin:4px 0;"><span style="color:var(--gold);">${lr.name}:</span> ${(lr.wins || []).join(', ') || 'nothing'}</div>`
          ).join('');
          
          historyHtml += `
            <div class="history-item" onclick="toggleRunExpand('${runId}')">
              <div class="history-item-title">${date} | ${run.zone_name} | ${totalPlayers} members | ${totalCurrency} total currency</div>
              
              <div id="${runId}-expand" class="history-expand" style="display:none;">
                <div style="margin: 12px 0; padding: 12px; background: rgba(0,0,0,0.2); border-radius: 6px;">
                  <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:8px;font-weight:600;">Members:</div>
                  <div style="font-size:0.85rem;color:var(--text-bright);margin-bottom:12px;">${playerNames}</div>
                  
                  <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:8px;font-weight:600;">Currency Distribution:</div>
                  ${currencyHtml || '<div style="color:var(--text-dim);">No currency data</div>'}
                  
                  <div style="font-size:0.8rem;color:var(--text-dim);margin:12px 0 8px 0;font-weight:600;">Fee & Sales:</div>
                  <div style="font-size:0.85rem;margin-bottom:8px;">Entry Fee: ${(run.entry_fee_per_player || 0).toLocaleString()} gil per player</div>
                  <div style="font-size:0.85rem;margin-bottom:12px;">Relic Sales: ${(run.relic_sales || 0).toLocaleString()} gil</div>
                  
                  <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:8px;font-weight:600;">Lottery Results:</div>
                  ${lotteryHtml || '<div style="color:var(--text-dim);">No results</div>'}
                </div>
                <div style="text-align: right; margin-top: 8px;">
                  <button onclick="deleteRun('${run.id}'); event.stopPropagation();" style="background: rgba(200,64,64,0.15); border: 1px solid rgba(200,64,64,0.4); border-radius: 4px; color: var(--red); font-size: 0.7rem; padding: 4px 8px; cursor: pointer;">🗑️ Delete</button>
                </div>
              </div>
            </div>
          `;
        });
      }

      historyHtml += '</div></div>';
      // Combine and render
      container.innerHTML = statsHtml + historyHtml;
 
    } catch (error) {
      console.error('Error:', error);
      container.innerHTML = '<div class="error">An error occurred while loading analytics.</div>';
    }
  }
 
  function handleLogout() {
    logout();
    window.location.href = 'login.html';
  }

  async function deleteRun(runId) {
    if (!confirm('Are you sure you want to delete this run? This action cannot be undone.')) {
      return;
    }
    
    try {
      const success = await deleteRunFromDB(runId);
      if (success) {
        // Reload the dashboard
        loadDashboard();
      } else {
        alert('Failed to delete run. Please try again.');
      }
    } catch (error) {
      console.error('Error deleting run:', error);
      alert('An error occurred while deleting the run.');
    }
  }

  function toggleRunExpand(runId) {
    const expandEl = document.getElementById(runId + '-expand');
    if (expandEl) {
      expandEl.style.display = expandEl.style.display === 'none' ? 'block' : 'none';
    }
  }

  // Load on page load
  // Wait for scripts to load, then load page
  window.addEventListener('load', loadDashboard);
</script>
 
</body>
</html>
