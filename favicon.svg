<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#1a1a2e"/>
  
  <!-- Outer gold circle -->
  <circle cx="128" cy="128" r="110" fill="#f0bc2e" opacity="0.95"/>
  
  <!-- Inner darker gold -->
  <circle cx="128" cy="128" r="100" fill="#ffe066"/>
  
  <!-- Coin shine/3D effect -->
  <circle cx="128" cy="128" r="95" fill="url(#goldGradient)"/>
  
  <!-- Center symbol (stylized 'D' for Dynamis) -->
  <text x="128" y="145" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#8a6a10" text-anchor="middle" opacity="0.9">D</text>
  
  <!-- Border ring -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="#8a6a10" stroke-width="4"/>
  <circle cx="128" cy="128" r="105" fill="none" stroke="#5a4a00" stroke-width="2"/>
  
  <!-- Glow effect -->
  <defs>
    <radialGradient id="goldGradient" cx="35%" cy="35%">
      <stop offset="0%" style="stop-color:#fff8dc;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#f0bc2e;stop-opacity:0.3" />
    </radialGradient>
  </defs>
</svg>
