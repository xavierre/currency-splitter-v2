<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Dynamis Currency Split</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script src="vercel-analytics-init.js"></script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
  .auth-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(135deg, rgba(8,10,16,1) 0%, rgba(20,24,40,1) 100%);
  }
  .auth-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .auth-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--gold);
    text-align: center;
    margin-bottom: 8px;
    text-shadow: 0 0 30px rgba(240,188,46,0.5);
  }
  .auth-subtitle {
    font-size: 0.85rem;
    color: var(--text-dim);
    text-align: center;
    margin-bottom: 28px;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }
  .form-group label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-bright);
    font-family: var(--font);
    font-size: 0.95rem;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(78,127,255,0.15);
  }
  .auth-btn {
    background: linear-gradient(135deg, rgba(240,188,46,0.28), rgba(240,188,46,0.12));
    border: 1px solid var(--gold);
    border-radius: 6px;
    color: var(--gold-light);
    font-family: var(--font);
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    margin-bottom: 12px;
  }
  .auth-btn:hover {
    background: linear-gradient(135deg, rgba(240,188,46,0.46), rgba(240,188,46,0.22));
    box-shadow: 0 0 24px rgba(240,188,46,0.2);
  }
  .auth-toggle {
    text-align: center;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .auth-toggle button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
    font-family: var(--font);
  }
  .auth-error {
    background: rgba(200,64,64,0.1);
    border: 1px solid rgba(200,64,64,0.3);
    border-radius: 6px;
    color: var(--red);
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    display: none;
  }
  .back-link {
    display: inline-block;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.8rem;
    margin-bottom: 20px;
    transition: color 0.2s;
  }
  .back-link:hover {
    color: var(--accent);
  }
</style>
</head>
<body>

<div class="auth-container">
  <div class="auth-box">
    <a href="index.html" class="back-link">← Back to Calculator</a>
    
    <div class="auth-title">⚔ Dynamis Split</div>
    <div class="auth-subtitle" id="auth-subtitle">Sign in to view analytics</div>

    <div class="auth-error" id="auth-error"></div>

    <form id="auth-form" onsubmit="handleAuth(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="email" required placeholder="your username" autocomplete="username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
      </div>

      <button type="submit" class="auth-btn" id="auth-submit">Sign In</button>
    </form>

    <div class="auth-toggle">
      Don't have an account? 
      <button onclick="toggleMode()">Sign Up</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.1"></script>
<script src="auth.js"></script>
<script>
  let isSignupMode = false;

  function toggleMode() {
    isSignupMode = !isSignupMode;
    const subtitle = document.getElementById('auth-subtitle');
    const submit = document.getElementById('auth-submit');
    const toggle = document.querySelector('.auth-toggle button').parentElement;

    if (isSignupMode) {
      subtitle.textContent = 'Create an account';
      submit.textContent = 'Sign Up';
      toggle.innerHTML = 'Already have an account? <button onclick="toggleMode()">Sign In</button>';
    } else {
      subtitle.textContent = 'Sign in to view analytics';
      submit.textContent = 'Sign In';
      toggle.innerHTML = 'Don\'t have an account? <button onclick="toggleMode()">Sign Up</button>';
    }

    document.getElementById('auth-error').style.display = 'none';
  }

  async function handleAuth(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('auth-error');
    const submitBtn = document.getElementById('auth-submit');

    submitBtn.disabled = true;
    errorEl.style.display = 'none';

    try {
      const result = isSignupMode ? await signup(email, password) : await login(email, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = result.error;
        errorEl.style.display = 'block';
        submitBtn.disabled = false;
      }
    } catch (error) {
      errorEl.textContent = 'Error: ' + error.message;
      errorEl.style.display = 'block';
      submitBtn.disabled = false;
    }
  }

  // If already logged in, redirect to main app
  _authReady.then(() => {
    if (isLoggedIn()) window.location.href = 'index.html';
  });
</script>

</body>
</html>
